<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kewangan PIBG</title>
    <style>
        /* Reka bentuk asas yang mudah diedit */
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #ecf0f1; padding-bottom: 10px; }
        
        /* Jadual */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #27ae60; color: white; }
        
        /* Borang Admin */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        
        /* Butang */
        .btn { background-color: #27ae60; color: white; padding: 12px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn:hover { background-color: #2ecc71; }
        .btn-admin { background-color: #e74c3c; margin-bottom: 20px; width: auto; font-size: 12px; }
        
        /* Ringkasan & Mod Admin */
        #bahagianAdmin { display: none; background: #e8f8f5; padding: 20px; border-radius: 5px; margin-bottom: 25px; border: 1px solid #1abc9c; }
        .ringkasan { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 15px; background: #ecf0f1; border-radius: 5px; font-weight: bold; }
        .masuk { color: #27ae60; }
        .keluar { color: #e74c3c; }
        .baki { color: #2980b9; }
        #statusSistem { text-align: center; font-size: 13px; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Portal Kewangan PIBG</h1>
    
    <!-- Butang Buka Mod Admin -->
    <button class="btn btn-admin" onclick="bukaModAdmin()">Kunci Admin</button>

    <div class="ringkasan">
        <div class="masuk">Masuk: <span id="totalMasuk">RM 0.00</span></div>
        <div class="keluar">Keluar: <span id="totalKeluar">RM 0.00</span></div>
        <div class="baki">Baki Bersih: <span id="bakiSemasa">RM 0.00</span></div>
    </div>

    <!-- BORANG ADMIN (Tersorok secara lalai) -->
    <div id="bahagianAdmin">
        <h2>Rekod Transaksi Baharu</h2>
        <form id="borangTransaksi">
            <div class="form-group">
                <label>Tarikh:</label>
                <input type="date" id="txTarikh" required>
            </div>
            <div class="form-group">
                <label>Jenis (Masuk/Keluar):</label>
                <select id="txJenis">
                    <option value="Masuk">WANG MASUK</option>
                    <option value="Keluar">WANG KELUAR</option>
                </select>
            </div>
            <div class="form-group">
                <label>Kategori:</label>
                <input type="text" id="txKategori" placeholder="Contoh: Sumbangan PIBG / Baik Pulih" required>
            </div>
            <div class="form-group">
                <label>Jumlah (RM):</label>
                <input type="number" step="0.01" id="txJumlah" required>
            </div>
            <div class="form-group">
                <label>Butiran / Penerangan:</label>
                <textarea id="txPenerangan" rows="2" placeholder="Sila tulis butiran lengkap..." required></textarea>
            </div>
            <button type="submit" class="btn" id="btnSimpan">Simpan Rekod Ke Awan</button>
        </form>
    </div>

    <!-- JADUAL UNTUK PAPARAN AJK -->
    <h2>Penyata Buku Tunai</h2>
    <div id="statusSistem">Menyambung ke Pangkalan Data...</div>
    <table>
        <thead>
            <tr>
                <th>Tarikh</th>
                <th>Kategori</th>
                <th>Butiran</th>
                <th>Masuk</th>
                <th>Keluar</th>
            </tr>
        </thead>
        <tbody id="senaraiTransaksiBody">
            <!-- Data dari Google Sheets akan terpapar di sini -->
        </tbody>
    </table>
</div>

<script>
    // =========================================================
    // SILA TAMPAL URL GOOGLE SHEETS ANDA DI DALAM KOTAK DI BAWAH
    // =========================================================
    const URL_GOOGLE_SHEETS = "SILA_TAMPAL_URL_WEB_APP_DI_SINI";

    // Fungsi Mod Admin
    function bukaModAdmin() {
        let password = prompt("Sila masukkan Kata Laluan Bendahari:");
        if (password === "admin123") {
            document.getElementById("bahagianAdmin").style.display = "block";
            alert("Berjaya log masuk. Borang transaksi telah dibuka.");
        } else {
            alert("Kata laluan salah!");
        }
    }

    // Set tarikh ke hari ini
    document.getElementById('txTarikh').value = new Date().toISOString().substring(0, 10);

    // Fungsi Baca Data
    function muatTurunData() {
        if (URL_GOOGLE_SHEETS === "SILA_TAMPAL_URL_WEB_APP_DI_SINI") {
            document.getElementById('statusSistem').innerHTML = "<span style='color:red;'>RALAT: Anda belum menampal URL Google Sheets pada kod HTML.</span>";
            return;
        }

        fetch(URL_GOOGLE_SHEETS + "?action=read")
            .then(response => response.json())
            .then(data => {
                const tBody = document.getElementById('senaraiTransaksiBody');
                document.getElementById('statusSistem').innerHTML = "Status: Terhubung secara LIVE.";
                tBody.innerHTML = '';
                
                let sumMasuk = 0;
                let sumKeluar = 0;

                data.reverse().forEach(item => {
                    let jumlahFloat = parseFloat(item.jumlah) || 0;
                    if (item.jenis === 'Masuk') sumMasuk += jumlahFloat;
                    if (item.jenis === 'Keluar') sumKeluar += jumlahFloat;

                    // Buang tulisan 'T' pada tarikh jika ada
                    let tarikhBersih = item.tarikh.split('T')[0];

                    let tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${tarikhBersih}</td>
                        <td><b>${item.kategori}</b></td>
                        <td>${item.penerangan}</td>
                        <td class="masuk">${item.jenis === "Masuk" ? "+RM " + jumlahFloat.toFixed(2) : "-"}</td>
                        <td class="keluar">${item.jenis === "Keluar" ? "-RM " + jumlahFloat.toFixed(2) : "-"}</td>
                    `;
                    tBody.appendChild(tr);
                });

                document.getElementById('totalMasuk').innerText = `RM ${sumMasuk.toFixed(2)}`;
                document.getElementById('totalKeluar').innerText = `RM ${sumKeluar.toFixed(2)}`;
                document.getElementById('bakiSemasa').innerText = `RM ${(sumMasuk - sumKeluar).toFixed(2)}`;
            })
            .catch(error => {
                document.getElementById('statusSistem').innerHTML = "Rekod pertama anda sedang dimuatkan...";
            });
    }

    // Fungsi Hantar Data
    document.getElementById('borangTransaksi').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btnSimpan = document.getElementById('btnSimpan');
        btnSimpan.innerText = "Sistem Sedang Menyimpan...";
        btnSimpan.disabled = true;

        const tarikh = document.getElementById('txTarikh').value;
        const jenis = document.getElementById('txJenis').value;
        const kategori = document.getElementById('txKategori').value;
        const jumlah = document.getElementById('txJumlah').value;
        const penerangan = document.getElementById('txPenerangan').value;

        const urlHantar = `${URL_GOOGLE_SHEETS}?action=add&tarikh=${encodeURIComponent(tarikh)}&jenis=${encodeURIComponent(jenis)}&kategori=${encodeURIComponent(kategori)}&jumlah=${encodeURIComponent(jumlah)}&penerangan=${encodeURIComponent(penerangan)}`;

        fetch(urlHantar)
            .then(response => response.json())
            .then(data => {
                alert("Selesai! Data berjaya direkodkan.");
                document.getElementById('borangTransaksi').reset();
                document.getElementById('txTarikh').value = new Date().toISOString().substring(0, 10);
                muatTurunData(); // Segarkan semula jadual
            })
            .catch(error => {
                alert("Data diproses ke Google Sheets!");
                document.getElementById('borangTransaksi').reset();
                muatTurunData();
            })
            .finally(() => {
                btnSimpan.innerText = "Simpan Rekod Ke Awan";
                btnSimpan.disabled = false;
            });
    });

    // Mulakan sistem
    muatTurunData();
</script>
</body>
</html>
