<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kewangan PIBG - LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <nav class="bg-emerald-700 text-white shadow-md">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                <span class="font-bold text-xl tracking-wide">PORTAL PIBG (LIVE)</span>
            </div>
            <div id="statusSistem" class="text-sm bg-amber-500 px-3 py-1.5 rounded-lg border border-amber-600 font-bold flex items-center">
                <i class="fa-solid fa-spinner fa-spin mr-2"></i> Menyambung ke Awan...
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Papan Pemuka -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Jumlah Masuk</p>
                    <h3 class="text-3xl font-bold text-emerald-600 mt-1" id="totalMasuk">RM 0.00</h3>
                </div>
                <div class="bg-emerald-100 text-emerald-600 p-4 rounded-full"><i class="fa-solid fa-wallet text-2xl"></i></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Jumlah Keluar</p>
                    <h3 class="text-3xl font-bold text-rose-600 mt-1" id="totalKeluar">RM 0.00</h3>
                </div>
                <div class="bg-rose-100 text-rose-600 p-4 rounded-full"><i class="fa-solid fa-money-bill-transfer text-2xl"></i></div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                <div>
                    <p class="text-sm text-slate-500 font-medium uppercase tracking-wider">Baki Semasa</p>
                    <h3 class="text-3xl font-bold text-blue-600 mt-1" id="bakiSemasa">RM 0.00</h3>
                </div>
                <div class="bg-blue-100 text-blue-600 p-4 rounded-full"><i class="fa-solid fa-scale-balanced text-2xl"></i></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Borang Input -->
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 sticky top-6">
                    <h2 class="text-lg font-bold text-slate-700 mb-4 pb-2 border-b border-slate-100"><i class="fa-solid fa-plus-circle text-emerald-600 mr-2"></i> Tambah Transaksi</h2>
                    <form id="borangTransaksi" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Tarikh</label>
                            <input type="date" id="txTarikh" required class="w-full px-3 py-2 border rounded-lg text-sm">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Jenis</label>
                            <div class="grid grid-cols-2 gap-3">
                                <label class="border rounded-lg p-2 flex justify-center cursor-pointer hover:bg-emerald-50">
                                    <input type="radio" name="txJenis" value="Masuk" checked class="mr-2"><span class="text-xs font-bold text-emerald-700">MASUK</span>
                                </label>
                                <label class="border rounded-lg p-2 flex justify-center cursor-pointer hover:bg-rose-50">
                                    <input type="radio" name="txJenis" value="Keluar" class="mr-2"><span class="text-xs font-bold text-rose-700">KELUAR</span>
                                </label>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Kategori</label>
                            <select id="txKategori" required class="w-full px-3 py-2 border rounded-lg text-sm">
                                <option value="Sumbangan PIBG">Sumbangan PIBG</option>
                                <option value="Kebajikan Murid">Kebajikan Murid</option>
                                <option value="Program Sekolah">Program Sekolah</option>
                                <option value="Penyelenggaraan">Penyelenggaraan</option>
                                <option value="Lain-lain">Lain-lain</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Jumlah (RM)</label>
                            <input type="number" step="0.01" id="txJumlah" required class="w-full px-3 py-2 border rounded-lg text-sm font-bold">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-600 uppercase mb-1">Butiran</label>
                            <textarea id="txPenerangan" rows="2" required class="w-full px-3 py-2 border rounded-lg text-sm"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-4 rounded-lg flex justify-center items-center space-x-2">
                            <i class="fa-solid fa-paper-plane"></i> <span id="teksButang">Simpan ke Awan</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- Jadual Data -->
            <div class="lg:col-span-2">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-700 mb-4 pb-4 border-b">Rekod Masa Nyata (Live)</h2>
                    <div class="overflow-x-auto rounded-lg border border-slate-200">
                        <table class="min-w-full divide-y divide-slate-200 text-sm text-left">
                            <thead class="bg-slate-100 text-slate-600 font-semibold text-xs uppercase">
                                <tr>
                                    <th class="px-4 py-3">Tarikh</th>
                                    <th class="px-4 py-3">Kategori</th>
                                    <th class="px-4 py-3">Butiran</th>
                                    <th class="px-4 py-3 text-right">Masuk</th>
                                    <th class="px-4 py-3 text-right">Keluar</th>
                                </tr>
                            </thead>
                            <tbody id="senaraiTransaksiBody" class="divide-y divide-slate-100 bg-white">
                                <!-- Data ditarik dari Google Sheets akan dipaparkan di sini -->
                            </tbody>
                        </table>
                        <div id="tiadaRekod" class="text-center py-8 text-slate-500 font-medium">
                            <i class="fa-solid fa-cloud-arrow-down text-2xl mb-2 block"></i>
                            Sedang memuatkan data dari pangkalan...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // =========================================================================
        // MASUKKAN URL GOOGLE SHEETS APPS SCRIPT ANDA DI SINI
        // =========================================================================
        const URL_GOOGLE_SHEETS = "SILA_TAMPAL_URL_WEB_APP_DI_SINI";

        // Set tarikh lalai hari ini
        document.getElementById('txTarikh').value = new Date().toISOString().substring(0, 10);

        // FUNGSI 1: BACA DATA DARI GOOGLE SHEETS
        function muatTurunData() {
            if (URL_GOOGLE_SHEETS === "SILA_TAMPAL_URL_WEB_APP_DI_SINI") {
                document.getElementById('tiadaRekod').innerHTML = "RALAT: Sila masukkan URL Google Sheets pada kod sistem.";
                return;
            }

            fetch(URL_GOOGLE_SHEETS + "?action=read")
                .then(response => response.json())
                .then(data => {
                    const tBody = document.getElementById('senaraiTransaksiBody');
                    const tiadaRekod = document.getElementById('tiadaRekod');
                    const statusBadge = document.getElementById('statusSistem');
                    
                    tBody.innerHTML = '';
                    let sumMasuk = 0;
                    let sumKeluar = 0;

                    if (data.length > 0) {
                        tiadaRekod.classList.add('hidden');
                        // Terbalikkan data supaya yang terbaru di atas
                        data.reverse().forEach(item => {
                            let jumlahFloat = parseFloat(item.jumlah) || 0;
                            
                            if (item.jenis === 'Masuk') sumMasuk += jumlahFloat;
                            if (item.jenis === 'Keluar') sumKeluar += jumlahFloat;

                            let selMasuk = item.jenis === "Masuk" ? `<span class="text-emerald-600 font-semibold">+RM ${jumlahFloat.toFixed(2)}</span>` : "-";
                            let selKeluar = item.jenis === "Keluar" ? `<span class="text-rose-600 font-semibold">-RM ${jumlahFloat.toFixed(2)}</span>` : "-";
                            
                            // Format Tarikh Singkat jika ada masa (T)
                            let tarikhCantik = item.tarikh.split('T')[0];

                            const tr = document.createElement('tr');
                            tr.className = "hover:bg-slate-50";
                            tr.innerHTML = `
                                <td class="px-4 py-3 font-medium whitespace-nowrap">${tarikhCantik}</td>
                                <td class="px-4 py-3 text-xs font-bold uppercase text-slate-500">${item.kategori}</td>
                                <td class="px-4 py-3 text-slate-700">${item.penerangan}</td>
                                <td class="px-4 py-3 text-right">${selMasuk}</td>
                                <td class="px-4 py-3 text-right">${selKeluar}</td>
                            `;
                            tBody.appendChild(tr);
                        });
                    } else {
                        tiadaRekod.classList.remove('hidden');
                        tiadaRekod.innerHTML = "Belum ada sebarang transaksi direkodkan.";
                    }

                    // Kemaskini Papan Pemuka
                    document.getElementById('totalMasuk').innerText = `RM ${sumMasuk.toFixed(2)}`;
                    document.getElementById('totalKeluar').innerText = `RM ${sumKeluar.toFixed(2)}`;
                    document.getElementById('bakiSemasa').innerText = `RM ${(sumMasuk - sumKeluar).toFixed(2)}`;

                    // Tukar Status ke Berjaya
                    statusBadge.className = "text-sm bg-emerald-600 px-3 py-1.5 rounded-lg border border-emerald-500 font-bold flex items-center";
                    statusBadge.innerHTML = '<i class="fa-solid fa-wifi mr-2"></i> ONLINE';
                })
                .catch(error => {
                    document.getElementById('tiadaRekod').innerHTML = "Ralat menarik data. Sila semak 'Permission' pada Apps Script anda.";
                });
        }

        // FUNGSI 2: HANTAR DATA KE GOOGLE SHEETS
        document.getElementById('borangTransaksi').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const butangHantar = this.querySelector('button[type="submit"]');
            const teksButang = document.getElementById('teksButang');
            
            butangHantar.disabled = true;
            teksButang.innerHTML = "Sedang Menyimpan...";

            const tarikh = document.getElementById('txTarikh').value;
            const jenis = document.querySelector('input[name="txJenis"]:checked').value;
            const kategori = document.getElementById('txKategori').value;
            const jumlah = document.getElementById('txJumlah').value;
            const penerangan = document.getElementById('txPenerangan').value;

            const urlHantar = `${URL_GOOGLE_SHEETS}?action=add&tarikh=${encodeURIComponent(tarikh)}&jenis=${encodeURIComponent(jenis)}&kategori=${encodeURIComponent(kategori)}&jumlah=${encodeURIComponent(jumlah)}&penerangan=${encodeURIComponent(penerangan)}`;

            fetch(urlHantar)
                .then(response => response.json())
                .then(data => {
                    alert("Berjaya disimpan!");
                    document.getElementById('borangTransaksi').reset();
                    document.getElementById('txTarikh').value = new Date().toISOString().substring(0, 10);
                    muatTurunData(); // Tarik semula data jadual untuk kemaskini yang terbaru
                })
                .catch(error => {
                    alert("Ralat! Pastikan Apps Script 'Who has access' ditetapkan kepada 'Anyone'.");
                })
                .finally(() => {
                    butangHantar.disabled = false;
                    teksButang.innerHTML = "Simpan ke Awan";
                });
        });

        // Jalankan sistem memuat turun data sebaik sahaja laman dibuka
        muatTurunData();
    </script>
</body>
</html>
